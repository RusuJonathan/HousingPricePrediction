lgbm:
  num_leaves:
    distribution: IntUniformDistribution
    low: 10
    high: 100
  max_depth:
    distribution: IntUniformDistribution
    low: 1
    high: 10
  learning_rate:
    distribution: LogUniformDistribution
    low: 0.001
    high: 0.2
  n_estimators:
    distribution: IntUniformDistribution
    low: 50
    high: 1000
  subsample:
    distribution: UniformDistribution
    low: 0.2
    high: 1.0
  colsample_bytree:
    distribution: UniformDistribution
    low: 0.2
    high: 1.0
  reg_lambda:
    distribution: LogUniformDistribution
    low: 0.5
    high: 5.0
  reg_alpha:
    distribution: LogUniformDistribution
    low: 0.1
    high: 5.0
  min_child_weight:
    distribution: LogUniformDistribution
    low: 1
    high: 20

xgboost:
  n_estimators:
    distribution: IntUniformDistribution
    low: 50
    high: 1000
  max_depth:
    distribution: IntUniformDistribution
    low: 1
    high: 12
  learning_rate:
    distribution: LogUniformDistribution
    low: 0.01
    high: 0.5
  subsample:
    distribution: UniformDistribution
    low: 0.5
    high: 1.0
  colsample_bytree:
    distribution: UniformDistribution
    low: 0.5
    high: 1.0
  gamma:
    distribution: UniformDistribution
    low: 0
    high: 5.0
  reg_alpha:
    distribution: UniformDistribution
    low: 0
    high: 5
  reg_lambda:
    distribution: UniformDistribution
    low: 0
    high: 5

svr:
  C:
    distribution: LogUniformDistribution
    low: 0.001
    high: 1000
  epsilon:
    distribution: LogUniformDistribution
    low: 0.0001
    high: 1.0
  gamma:
    distribution: LogUniformDistribution
    low: 0.0001
    high: 10

elasticnet:
  alpha:
    distribution: LogUniformDistribution
    low: 0.0001
    high: 1
  l1_ratio:
    distribution: UniformDistribution
    low: 0.05
    high: 0.95

random_forest:
  n_estimators:
    distribution: IntUniformDistribution
    low: 50
    high: 1200
  max_depth:
    distribution: IntUniformDistribution
    low: 1
    high: 12
  min_samples_split:
    distribution: IntUniformDistribution
    low: 2
    high: 20
  min_samples_leaf:
    distribution: IntUniformDistribution
    low: 1
    high: 10
  max_samples:
    distribution: LogUniformDistribution
    low: 0.3
    high: 1.0
  max_features:
    distribution: CategoricalDistribution
    categories: [ 'sqrt', 'log2', 1 ]

catboost:
  iterations:
    distribution: IntUniformDistribution
    low: 30
    high: 350

  depth:
    distribution: IntUniformDistribution
    low: 1
    high: 10

  learning_rate:
    distribution: LogUniformDistribution
    low: 0.001
    high: 0.2

  colsample_bylevel:
    distribution: UniformDistribution
    low: 0.2
    high: 1.0

  l2_leaf_reg:
    distribution: LogUniformDistribution
    low: 0.1
    high: 10.0

  random_strength:
    distribution: UniformDistribution
    low: 0.1
    high: 10.0